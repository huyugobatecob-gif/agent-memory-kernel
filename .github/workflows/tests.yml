name: CI

on:
  push:
  pull_request:

jobs:
  local-proof:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python
        run: python3 -m compileall -q src tests

      - name: Run unit tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests

      - name: Assert memory contract
        run: PYTHONPATH=src python3 -m agent_memory_kernel.cli contract assert

      - name: Assert conformance spec shape
        run: PYTHONPATH=src python3 -m agent_memory_kernel.cli conformance spec-assert

      - name: Run deterministic vertical slice
        run: |
          PYTHONPATH=src python3 -m agent_memory_kernel.cli slice seed --db /tmp/amk-slice.db
          PYTHONPATH=src python3 -m agent_memory_kernel.cli slice run --db /tmp/amk-slice.db
          PYTHONPATH=src python3 -m agent_memory_kernel.cli slice assert --db /tmp/amk-slice.db

      - name: Run public conformance fixture
        run: |
          PYTHONPATH=src python3 -m agent_memory_kernel.cli conformance seed --db /tmp/amk-conformance.db
          PYTHONPATH=src python3 -m agent_memory_kernel.cli conformance assert --db /tmp/amk-conformance.db

      - name: Check whitespace
        run: git diff --check
